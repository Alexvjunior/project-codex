AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Secretaria IA MVP - Foundational infrastructure stack (ISS-001)

Parameters:
  ServiceName:
    Type: String
    Default: secretaria-ia
  Stage:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z0-9-]+$"
  LogRetentionDays:
    Type: Number
    Default: 14
  MessageTtlDays:
    Type: Number
    Default: 7
  PaymentTtlDays:
    Type: Number
    Default: 180
  AlarmEmail:
    Type: String
    Default: ""
    Description: Optional email for CloudWatch alarm notifications.
  AggregationWindowSeconds:
    Type: Number
    Default: 15
  PaymentTimeoutMinutes:
    Type: Number
    Default: 1440
  MaxReschedules:
    Type: Number
    Default: 1
  HandoffTtlMinutes:
    Type: Number
    Default: 10
  OutboxMaxRetries:
    Type: Number
    Default: 3
  MaxTokensPerTurn:
    Type: Number
    Default: 1200
  MonthlyBudgetUsd:
    Type: Number
    Default: 20
  QueueMaxReceiveCount:
    Type: Number
    Default: 5
  OrchestratorP95LatencyMs:
    Type: Number
    Default: 5000
  WhatsAppSecretId:
    Type: String
    Default: ""
    Description: Secrets Manager secret id for WhatsApp credentials.
  PaymentSecretId:
    Type: String
    Default: ""
    Description: Secrets Manager secret id for payment gateway credentials.
  LlmSecretId:
    Type: String
    Default: ""
    Description: Secrets Manager secret id for LLM provider credentials.

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, ""]]

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        SERVICE_NAME: !Ref ServiceName
        CONVERSATIONS_TABLE: !Ref ConversationsTable
        MESSAGES_TABLE: !Ref MessagesTable
        APPOINTMENTS_TABLE: !Ref AppointmentsTable
        PAYMENTS_TABLE: !Ref PaymentsTable
        OUTBOX_TABLE: !Ref OutboxTable
        IDEMPOTENCY_TABLE: !Ref IdempotencyTable
        INBOUND_QUEUE_URL: !Ref InboundQueue
        TURN_QUEUE_URL: !Ref TurnQueue
        OUTBOUND_QUEUE_URL: !Ref OutboundQueue
        WHATSAPP_SECRET_ID: !Ref WhatsAppSecretId
        PAYMENT_SECRET_ID: !Ref PaymentSecretId
        LLM_SECRET_ID: !Ref LlmSecretId
        AGGREGATION_WINDOW_SECONDS: !Ref AggregationWindowSeconds
        PAYMENT_TIMEOUT_MINUTES: !Ref PaymentTimeoutMinutes
        MAX_RESCHEDULES: !Ref MaxReschedules
        HANDOFF_TTL_MINUTES: !Ref HandoffTtlMinutes
        OUTBOX_MAX_RETRIES: !Ref OutboxMaxRetries
        MAX_TOKENS_PER_TURN: !Ref MaxTokensPerTurn

Resources:
  SharedCodeLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${ServiceName}-${Stage}-shared"
      Description: Shared Python code for all lambda functions.
      ContentUri: ../layers/shared/
      CompatibleRuntimes:
        - python3.11

  PublicHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "${ServiceName}-${Stage}-api"
      StageName: !Ref Stage

  InboundQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-${Stage}-inbound.fifo"
      FifoQueue: true
      ContentBasedDeduplication: false
      VisibilityTimeout: 90
      MessageRetentionPeriod: 1209600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt InboundDlq.Arn
        maxReceiveCount: !Ref QueueMaxReceiveCount

  TurnQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-${Stage}-turn.fifo"
      FifoQueue: true
      ContentBasedDeduplication: false
      VisibilityTimeout: 90
      MessageRetentionPeriod: 1209600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TurnDlq.Arn
        maxReceiveCount: !Ref QueueMaxReceiveCount

  OutboundQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-${Stage}-outbound.fifo"
      FifoQueue: true
      ContentBasedDeduplication: false
      VisibilityTimeout: 90
      MessageRetentionPeriod: 1209600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt OutboundDlq.Arn
        maxReceiveCount: !Ref QueueMaxReceiveCount

  InboundDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-${Stage}-inbound-dlq.fifo"
      FifoQueue: true
      ContentBasedDeduplication: true
      MessageRetentionPeriod: 1209600

  TurnDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-${Stage}-turn-dlq.fifo"
      FifoQueue: true
      ContentBasedDeduplication: true
      MessageRetentionPeriod: 1209600

  OutboundDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-${Stage}-outbound-dlq.fifo"
      FifoQueue: true
      ContentBasedDeduplication: true
      MessageRetentionPeriod: 1209600

  ConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-conversations"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-messages"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: message_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: message_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  AppointmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-appointments"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: appointment_id
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: slot_start
          AttributeType: S
      KeySchema:
        - AttributeName: appointment_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by_tenant_slot
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: slot_start
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  PaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-payments"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: payment_id
          AttributeType: S
        - AttributeName: appointment_id
          AttributeType: S
      KeySchema:
        - AttributeName: payment_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by_appointment
          KeySchema:
            - AttributeName: appointment_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  OutboxTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-outbox"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: outbox_id
          AttributeType: S
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: outbox_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by_session
          KeySchema:
            - AttributeName: session_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-idempotency"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idempotency_key
          AttributeType: S
      KeySchema:
        - AttributeName: idempotency_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  IngestWhatsappFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-${Stage}-ingest-whatsapp"
      CodeUri: ../src/functions/ingest_whatsapp/
      Handler: handler.lambda_handler
      Description: Validates and normalizes WhatsApp webhook payloads.
      Layers:
        - !Ref SharedCodeLayer
      Policies:
        - Statement:
            - Sid: SendInboundMessages
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt InboundQueue.Arn
            - Sid: IdempotencyWrite
              Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource: !GetAtt IdempotencyTable.Arn
            - Sid: MessagesWrite
              Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt MessagesTable.Arn
            - Sid: ReadSecrets
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: "*"
      Events:
        WhatsAppWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicHttpApi
            Method: POST
            Path: /whatsapp-webhook
        WhatsAppVerify:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicHttpApi
            Method: GET
            Path: /whatsapp-webhook
        IngestHealthcheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicHttpApi
            Method: GET
            Path: /health/ingest

  MessageAggregatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-${Stage}-message-aggregator"
      CodeUri: ../src/functions/message_aggregator/
      Handler: handler.lambda_handler
      Description: Debounces inbound user messages into conversation turns.
      Timeout: 60
      Layers:
        - !Ref SharedCodeLayer
      Policies:
        - Statement:
            - Sid: ConsumeInboundMessages
              Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt InboundQueue.Arn
            - Sid: SendTurns
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt TurnQueue.Arn
            - Sid: ReadWriteConversation
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:PutItem
              Resource:
                - !GetAtt ConversationsTable.Arn
                - !GetAtt MessagesTable.Arn
            - Sid: ReadSecrets
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: "*"
      Events:
        FromInboundQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt InboundQueue.Arn
            BatchSize: 10

  ConversationOrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-${Stage}-conversation-orchestrator"
      CodeUri: ../src/functions/conversation_orchestrator/
      Handler: handler.lambda_handler
      Description: Runs LangGraph orchestration and emits outbound messages.
      Timeout: 60
      Layers:
        - !Ref SharedCodeLayer
      Policies:
        - Statement:
            - Sid: ConsumeTurnQueue
              Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt TurnQueue.Arn
            - Sid: SendOutboundMessages
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt OutboundQueue.Arn
            - Sid: DomainTableAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt ConversationsTable.Arn
                - !GetAtt MessagesTable.Arn
                - !GetAtt AppointmentsTable.Arn
                - !GetAtt PaymentsTable.Arn
                - !GetAtt OutboxTable.Arn
                - !GetAtt IdempotencyTable.Arn
            - Sid: ReadSecrets
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: "*"
      Events:
        FromTurnQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt TurnQueue.Arn
            BatchSize: 5

  PaymentWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-${Stage}-payment-webhook"
      CodeUri: ../src/functions/payment_webhook/
      Handler: handler.lambda_handler
      Description: Handles payment provider callbacks with deterministic logic.
      Layers:
        - !Ref SharedCodeLayer
      Policies:
        - Statement:
            - Sid: PaymentStateUpdates
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt PaymentsTable.Arn
                - !GetAtt AppointmentsTable.Arn
                - !GetAtt IdempotencyTable.Arn
            - Sid: QueueConfirmationMessages
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt OutboundQueue.Arn
            - Sid: OutboxWrite
              Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:GetItem
              Resource: !GetAtt OutboxTable.Arn
            - Sid: ReadSecrets
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: "*"
      Events:
        PaymentWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicHttpApi
            Method: POST
            Path: /payment-webhook
        PaymentHealthcheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicHttpApi
            Method: GET
            Path: /health/payment

  WhatsappSenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-${Stage}-whatsapp-sender"
      CodeUri: ../src/functions/whatsapp_sender/
      Handler: handler.lambda_handler
      Description: Delivers outbound messages to WhatsApp Cloud API.
      Timeout: 60
      Layers:
        - !Ref SharedCodeLayer
      Policies:
        - Statement:
            - Sid: ConsumeOutboundQueue
              Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt OutboundQueue.Arn
            - Sid: RequeueOutbound
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt OutboundQueue.Arn
            - Sid: OutboxWrite
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource: !GetAtt OutboxTable.Arn
            - Sid: ReadSecrets
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: "*"
      Events:
        FromOutboundQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt OutboundQueue.Arn
            BatchSize: 10

  IngestWhatsappLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${IngestWhatsappFunction}"
      RetentionInDays: !Ref LogRetentionDays

  MessageAggregatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${MessageAggregatorFunction}"
      RetentionInDays: !Ref LogRetentionDays

  ConversationOrchestratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ConversationOrchestratorFunction}"
      RetentionInDays: !Ref LogRetentionDays

  PaymentWebhookLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${PaymentWebhookFunction}"
      RetentionInDays: !Ref LogRetentionDays

  WhatsappSenderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${WhatsappSenderFunction}"
      RetentionInDays: !Ref LogRetentionDays

  InfraAlertsTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      TopicName: !Sub "${ServiceName}-${Stage}-alerts"

  InfraAlertsSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      Protocol: email
      Endpoint: !Ref AlarmEmail
      TopicArn: !Ref InfraAlertsTopic

  PaymentWebhookErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ServiceName}-${Stage}-payment-webhook-errors"
      AlarmDescription: Payment webhook function has errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref PaymentWebhookFunction
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref InfraAlertsTopic], !Ref "AWS::NoValue"]

  ConversationOrchestratorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ServiceName}-${Stage}-conversation-orchestrator-errors"
      AlarmDescription: Conversation orchestrator function has errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ConversationOrchestratorFunction
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref InfraAlertsTopic], !Ref "AWS::NoValue"]

  ConversationOrchestratorLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ServiceName}-${Stage}-conversation-orchestrator-p95-latency"
      AlarmDescription: Conversation orchestrator p95 latency is above target.
      Namespace: AWS/Lambda
      MetricName: Duration
      ExtendedStatistic: p95
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref OrchestratorP95LatencyMs
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ConversationOrchestratorFunction
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref InfraAlertsTopic], !Ref "AWS::NoValue"]

  InboundQueueAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ServiceName}-${Stage}-inbound-queue-age"
      AlarmDescription: Inbound queue oldest message age is high.
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 120
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt InboundQueue.QueueName
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref InfraAlertsTopic], !Ref "AWS::NoValue"]

  OutboundQueueAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ServiceName}-${Stage}-outbound-queue-age"
      AlarmDescription: Outbound queue oldest message age is high.
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 120
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt OutboundQueue.QueueName
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref InfraAlertsTopic], !Ref "AWS::NoValue"]

  InboundDlqDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ServiceName}-${Stage}-inbound-dlq-depth"
      AlarmDescription: Inbound DLQ has messages waiting for reprocessing.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt InboundDlq.QueueName
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref InfraAlertsTopic], !Ref "AWS::NoValue"]

  TurnDlqDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ServiceName}-${Stage}-turn-dlq-depth"
      AlarmDescription: Turn DLQ has messages waiting for reprocessing.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt TurnDlq.QueueName
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref InfraAlertsTopic], !Ref "AWS::NoValue"]

  OutboundDlqDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ServiceName}-${Stage}-outbound-dlq-depth"
      AlarmDescription: Outbound DLQ has messages waiting for reprocessing.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt OutboundDlq.QueueName
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref InfraAlertsTopic], !Ref "AWS::NoValue"]

  OpsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${ServiceName}-${Stage}-ops"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Errors",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/Lambda", "Errors", "FunctionName", "${IngestWhatsappFunction}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${MessageAggregatorFunction}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${ConversationOrchestratorFunction}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${PaymentWebhookFunction}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${WhatsappSenderFunction}"]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "SQS Oldest Message Age",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/SQS", "ApproximateAgeOfOldestMessage", "QueueName", "${InboundQueue.QueueName}"],
                  ["AWS/SQS", "ApproximateAgeOfOldestMessage", "QueueName", "${TurnQueue.QueueName}"],
                  ["AWS/SQS", "ApproximateAgeOfOldestMessage", "QueueName", "${OutboundQueue.QueueName}"]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Orchestrator Duration p95",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "stat": "p95",
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "${ConversationOrchestratorFunction}"]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "DLQ Visible Messages",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${InboundDlq.QueueName}"],
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${TurnDlq.QueueName}"],
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${OutboundDlq.QueueName}"]
                ]
              }
            }
          ]
        }

  MonthlyCostBudget:
    Type: AWS::Budgets::Budget
    Condition: HasAlarmEmail
    Properties:
      Budget:
        BudgetLimit:
          Amount: !Ref MonthlyBudgetUsd
          Unit: USD
        BudgetType: COST
        TimeUnit: MONTHLY
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref AlarmEmail

Outputs:
  ApiBaseUrl:
    Value: !Sub "https://${PublicHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  InboundQueueUrl:
    Value: !Ref InboundQueue
  InboundQueueArn:
    Value: !GetAtt InboundQueue.Arn
  TurnQueueUrl:
    Value: !Ref TurnQueue
  TurnQueueArn:
    Value: !GetAtt TurnQueue.Arn
  OutboundQueueUrl:
    Value: !Ref OutboundQueue
  OutboundQueueArn:
    Value: !GetAtt OutboundQueue.Arn
  InboundDlqUrl:
    Value: !Ref InboundDlq
  InboundDlqArn:
    Value: !GetAtt InboundDlq.Arn
  TurnDlqUrl:
    Value: !Ref TurnDlq
  TurnDlqArn:
    Value: !GetAtt TurnDlq.Arn
  OutboundDlqUrl:
    Value: !Ref OutboundDlq
