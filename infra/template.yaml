AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Secretaria IA MVP - Foundational infrastructure stack (ISS-001)

Parameters:
  ServiceName:
    Type: String
    Default: secretaria-ia
  Stage:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z0-9-]+$"
  LogRetentionDays:
    Type: Number
    Default: 14
  MessageTtlDays:
    Type: Number
    Default: 7
  PaymentTtlDays:
    Type: Number
    Default: 180
  AlarmEmail:
    Type: String
    Default: ""
    Description: Optional email for CloudWatch alarm notifications.

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, ""]]

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        STAGE: !Ref Stage
        SERVICE_NAME: !Ref ServiceName
        CONVERSATIONS_TABLE: !Ref ConversationsTable
        MESSAGES_TABLE: !Ref MessagesTable
        APPOINTMENTS_TABLE: !Ref AppointmentsTable
        PAYMENTS_TABLE: !Ref PaymentsTable
        OUTBOX_TABLE: !Ref OutboxTable
        IDEMPOTENCY_TABLE: !Ref IdempotencyTable
        INBOUND_QUEUE_URL: !Ref InboundQueue
        TURN_QUEUE_URL: !Ref TurnQueue
        OUTBOUND_QUEUE_URL: !Ref OutboundQueue

Resources:
  PublicHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "${ServiceName}-${Stage}-api"
      StageName: !Ref Stage

  InboundQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-${Stage}-inbound.fifo"
      FifoQueue: true
      ContentBasedDeduplication: false
      VisibilityTimeout: 90
      MessageRetentionPeriod: 1209600

  TurnQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-${Stage}-turn.fifo"
      FifoQueue: true
      ContentBasedDeduplication: false
      VisibilityTimeout: 90
      MessageRetentionPeriod: 1209600

  OutboundQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-${Stage}-outbound.fifo"
      FifoQueue: true
      ContentBasedDeduplication: false
      VisibilityTimeout: 90
      MessageRetentionPeriod: 1209600

  ConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-conversations"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-messages"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: message_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: message_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  AppointmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-appointments"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: appointment_id
          AttributeType: S
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: slot_start
          AttributeType: S
      KeySchema:
        - AttributeName: appointment_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by_tenant_slot
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: slot_start
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  PaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-payments"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: payment_id
          AttributeType: S
        - AttributeName: appointment_id
          AttributeType: S
      KeySchema:
        - AttributeName: payment_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by_appointment
          KeySchema:
            - AttributeName: appointment_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  OutboxTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-outbox"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: outbox_id
          AttributeType: S
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: outbox_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by_session
          KeySchema:
            - AttributeName: session_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ServiceName}-${Stage}-idempotency"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idempotency_key
          AttributeType: S
      KeySchema:
        - AttributeName: idempotency_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  IngestWhatsappFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-${Stage}-ingest-whatsapp"
      CodeUri: ../src/
      Handler: functions.ingest_whatsapp.handler.lambda_handler
      Description: Validates and normalizes WhatsApp webhook payloads.
      Policies:
        - Statement:
            - Sid: SendInboundMessages
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt InboundQueue.Arn
            - Sid: IdempotencyWrite
              Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
              Resource: !GetAtt IdempotencyTable.Arn
      Events:
        WhatsAppWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicHttpApi
            Method: POST
            Path: /whatsapp-webhook

  MessageAggregatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-${Stage}-message-aggregator"
      CodeUri: ../src/
      Handler: functions.message_aggregator.handler.lambda_handler
      Description: Debounces inbound user messages into conversation turns.
      Timeout: 60
      Policies:
        - Statement:
            - Sid: ConsumeInboundMessages
              Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt InboundQueue.Arn
            - Sid: SendTurns
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt TurnQueue.Arn
            - Sid: ReadWriteConversation
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:PutItem
              Resource:
                - !GetAtt ConversationsTable.Arn
                - !GetAtt MessagesTable.Arn
      Events:
        FromInboundQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt InboundQueue.Arn
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 10

  ConversationOrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-${Stage}-conversation-orchestrator"
      CodeUri: ../src/
      Handler: functions.conversation_orchestrator.handler.lambda_handler
      Description: Runs LangGraph orchestration and emits outbound messages.
      Timeout: 60
      Policies:
        - Statement:
            - Sid: ConsumeTurnQueue
              Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt TurnQueue.Arn
            - Sid: SendOutboundMessages
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt OutboundQueue.Arn
            - Sid: DomainTableAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt ConversationsTable.Arn
                - !GetAtt MessagesTable.Arn
                - !GetAtt AppointmentsTable.Arn
                - !GetAtt PaymentsTable.Arn
                - !GetAtt OutboxTable.Arn
      Events:
        FromTurnQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt TurnQueue.Arn
            BatchSize: 5
            MaximumBatchingWindowInSeconds: 5

  PaymentWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-${Stage}-payment-webhook"
      CodeUri: ../src/
      Handler: functions.payment_webhook.handler.lambda_handler
      Description: Handles payment provider callbacks with deterministic logic.
      Policies:
        - Statement:
            - Sid: PaymentStateUpdates
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt PaymentsTable.Arn
                - !GetAtt AppointmentsTable.Arn
                - !GetAtt IdempotencyTable.Arn
            - Sid: QueueConfirmationMessages
              Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt OutboundQueue.Arn
      Events:
        PaymentWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicHttpApi
            Method: POST
            Path: /payment-webhook

  WhatsappSenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ServiceName}-${Stage}-whatsapp-sender"
      CodeUri: ../src/
      Handler: functions.whatsapp_sender.handler.lambda_handler
      Description: Delivers outbound messages to WhatsApp Cloud API.
      Timeout: 60
      Policies:
        - Statement:
            - Sid: ConsumeOutboundQueue
              Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt OutboundQueue.Arn
            - Sid: OutboxWrite
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource: !GetAtt OutboxTable.Arn
      Events:
        FromOutboundQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt OutboundQueue.Arn
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 5

  IngestWhatsappLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${IngestWhatsappFunction}"
      RetentionInDays: !Ref LogRetentionDays

  MessageAggregatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${MessageAggregatorFunction}"
      RetentionInDays: !Ref LogRetentionDays

  ConversationOrchestratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ConversationOrchestratorFunction}"
      RetentionInDays: !Ref LogRetentionDays

  PaymentWebhookLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${PaymentWebhookFunction}"
      RetentionInDays: !Ref LogRetentionDays

  WhatsappSenderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${WhatsappSenderFunction}"
      RetentionInDays: !Ref LogRetentionDays

  InfraAlertsTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      TopicName: !Sub "${ServiceName}-${Stage}-alerts"

  InfraAlertsSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      Protocol: email
      Endpoint: !Ref AlarmEmail
      TopicArn: !Ref InfraAlertsTopic

  PaymentWebhookErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ServiceName}-${Stage}-payment-webhook-errors"
      AlarmDescription: Payment webhook function has errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref PaymentWebhookFunction
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref InfraAlertsTopic], !Ref "AWS::NoValue"]

  ConversationOrchestratorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ServiceName}-${Stage}-conversation-orchestrator-errors"
      AlarmDescription: Conversation orchestrator function has errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ConversationOrchestratorFunction
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref InfraAlertsTopic], !Ref "AWS::NoValue"]

Outputs:
  ApiBaseUrl:
    Value: !Sub "https://${PublicHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  InboundQueueUrl:
    Value: !Ref InboundQueue
  TurnQueueUrl:
    Value: !Ref TurnQueue
  OutboundQueueUrl:
    Value: !Ref OutboundQueue
  ConversationsTableName:
    Value: !Ref ConversationsTable
  MessagesTableName:
    Value: !Ref MessagesTable
  AppointmentsTableName:
    Value: !Ref AppointmentsTable
  PaymentsTableName:
    Value: !Ref PaymentsTable
  OutboxTableName:
    Value: !Ref OutboxTable
  IdempotencyTableName:
    Value: !Ref IdempotencyTable
