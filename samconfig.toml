version = 0.1

[default.global.parameters]
stack_name = "secretaria-ia-dev"
region = "us-east-1"

[default.validate.parameters]
template_file = "infra/template.yaml"
lint = true

[default.build.parameters]
template_file = "infra/template.yaml"
cached = true
parallel = true

[default.deploy.parameters]
template_file = "infra/template.yaml"
confirm_changeset = false
resolve_s3 = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = "ServiceName=secretaria-ia Stage=dev LogRetentionDays=14 MessageTtlDays=7 PaymentTtlDays=180 AlarmEmail="

[dev.deploy.parameters]
stack_name = "secretaria-ia-dev"
parameter_overrides = "ServiceName=secretaria-ia Stage=dev LogRetentionDays=14 MessageTtlDays=7 PaymentTtlDays=180 AlarmEmail="

[staging.deploy.parameters]
stack_name = "secretaria-ia-staging"
parameter_overrides = "ServiceName=secretaria-ia Stage=staging LogRetentionDays=14 MessageTtlDays=7 PaymentTtlDays=180 AlarmEmail="

[prod.deploy.parameters]
stack_name = "secretaria-ia-prod"
parameter_overrides = "ServiceName=secretaria-ia Stage=prod LogRetentionDays=30 MessageTtlDays=7 PaymentTtlDays=180 AlarmEmail="
