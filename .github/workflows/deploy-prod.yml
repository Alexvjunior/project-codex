name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"
      confirm_prod:
        description: "Type DEPLOY to confirm production deploy"
        required: true
        default: ""

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: us-east-1
      DEPLOY_REF: ${{ inputs.ref }}
      SAM_CONFIG_FILE: ${{ github.workspace }}/samconfig.toml
    steps:
      - name: Guard confirmation
        run: |
          if [ "${{ inputs.confirm_prod }}" != "DEPLOY" ]; then
            echo "Set confirm_prod=DEPLOY to allow production deployment."
            exit 1
          fi

      - name: Guard Gemini secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Missing required GitHub secret: GEMINI_API_KEY"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate (prod config)
        run: sam validate --template-file infra/template.yaml --config-file "$SAM_CONFIG_FILE" --config-env prod --lint

      - name: Build (prod config)
        run: sam build --template-file infra/template.yaml --config-file "$SAM_CONFIG_FILE" --config-env prod

      - name: Deploy (prod)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          sam deploy \
            --template-file infra/template.yaml \
            --stack-name secretaria-ia-prod \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ServiceName=secretaria-ia \
              Stage=prod \
              LogRetentionDays=30 \
              MessageTtlDays=7 \
              PaymentTtlDays=180 \
              AlarmEmail= \
              AggregationWindowSeconds=15 \
              PaymentTimeoutMinutes=720 \
              MaxReschedules=1 \
              HandoffTtlMinutes=10 \
              OutboxMaxRetries=3 \
              MaxTokensPerTurn=1200 \
              MonthlyBudgetUsd=50 \
              QueueMaxReceiveCount=5 \
              OrchestratorP95LatencyMs=5000 \
              WhatsAppSecretId=/secretaria-ia/prod/whatsapp \
              PaymentSecretId=/secretaria-ia/prod/payment-gateway \
              LlmSecretId= \
              GeminiApiKey="$GEMINI_API_KEY"

      - name: Summary
        run: |
          echo "Production deploy completed."
          echo "Ref: $DEPLOY_REF"
