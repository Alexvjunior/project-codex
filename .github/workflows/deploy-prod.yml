name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"
      confirm_prod:
        description: "Type DEPLOY to confirm production deploy"
        required: true
        default: ""

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: us-east-1
      DEPLOY_REF: ${{ inputs.ref }}
      SAM_CONFIG_FILE: ${{ github.workspace }}/samconfig.toml
    steps:
      - name: Guard confirmation
        run: |
          if [ "${{ inputs.confirm_prod }}" != "DEPLOY" ]; then
            echo "Set confirm_prod=DEPLOY to allow production deployment."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate (prod config)
        run: sam validate --template-file infra/template.yaml --config-file "$SAM_CONFIG_FILE" --config-env prod --lint

      - name: Build (prod config)
        run: sam build --template-file infra/template.yaml --config-file "$SAM_CONFIG_FILE" --config-env prod

      - name: Deploy (prod)
        run: sam deploy --template-file infra/template.yaml --config-file "$SAM_CONFIG_FILE" --config-env prod --no-confirm-changeset --no-fail-on-empty-changeset

      - name: Summary
        run: |
          echo "Production deploy completed."
          echo "Ref: $DEPLOY_REF"
